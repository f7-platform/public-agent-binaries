# docker-compose.yml — Unified fseven-controller deployment
#
# Per PROPOSAL-community-deployment §B1 this is the single compose file
# for every deployment shape. Pick a profile to select topology:
#
#   docker compose --profile community up -d    # default for self-hosters:
#                                                  postgres + controller
#   docker compose --profile prod      up -d    # cloud / on-prem + OpenFGA
#   docker compose --profile dev       up -d    # local dev: postgres +
#                                                  OpenFGA + adminer. The
#                                                  controller runs from
#                                                  `cargo run` on the host.
#
# Environment (typically written to `.env` by install.sh / install.ps1):
#   POSTGRES_PASSWORD           — REQUIRED for every profile; no default.
#                                 docker compose fails closed (errors out) when
#                                 it is unset so a missing secret can never fall
#                                 back to a weak credential (Audit Run 34,
#                                 INF2/INF3). install.sh generates a strong
#                                 password on first run; for local dev, copy
#                                 .env.example (which carries a throwaway value).
#   FSEVEN_APP_DB_PASSWORD      — REQUIRED for community/prod; generated by
#                                 install.sh. Password for the least-privilege
#                                 `fseven_app` DB role that migration 113 creates
#                                 and the controller provisions + verifies
#                                 (NOSUPERUSER/NOBYPASSRLS) at startup (Audit Run
#                                 34, CD1/CD9/INF4). The CD10 serving-role cutover
#                                 (Audit Run 35, #229; #200 added the per-request
#                                 app.current_org_id GUC) is LIVE in this compose:
#                                 the serving pool connects as `fseven_app` over
#                                 DATABASE_URL and the `:?` form fails closed on an
#                                 empty value, while migrations/bootstrap keep the
#                                 owner role on DATABASE_ADMIN_URL.
#   ADMIN_API_KEY               — required when the controller service runs
#   CREDENTIAL_ENCRYPTION_KEY   — required 64-char hex key for encrypting
#                                 telemetry HMAC keys + integration secrets
#   CONTROLLER_JWT_PRIVATE_KEY  — optional (controller generates on boot
#                                 if unset)
#   FSEVEN_LICENSE_PUB_KEY      — required for production license signature
#                                 verification (base64 raw Ed25519 public key)
#   CONTROLLER_IMAGE            — image reference (default pulls from GHCR)
#   PORT                        — host port for the controller (default 8080)
#   POSTGRES_PORT               — host port for Postgres (default 5432)
#   DEPLOYMENT_MODE             — "Community" | "Cloud". install.sh writes
#                                 Community; cloud operators set Cloud.
#   REDIS_URL                   — OPTIONAL. Shared rate-limit counters across
#                                 replicas (Audit Run 37, CC10). REQUIRED for
#                                 correct rate limiting whenever you run MORE
#                                 THAN ONE controller replica: without it each
#                                 replica keeps its own in-process buckets and
#                                 an attacker gets N x every limit (auth/admin
#                                 brute-force, enrollment, telemetry). Unset is
#                                 fine for single-replica/community. Start the
#                                 bundled Redis with the `redis` profile:
#                                   docker compose --profile prod --profile redis up -d
#                                 and set REDIS_URL=redis://redis:6379 in .env.

# This file is the published mirror of fseven-controller/docker-compose.yml,
# resynced verbatim on each controller release tag (release.yml). The env
# contract above must stay in parity with that source of truth; INF9 (Audit Run
# 34/35) tracks the drift, and tests/bootstrap-handoff-static.sh asserts the
# security-relevant invariants (fail-closed passwords, digest-pinned third-party
# images, the CD10 serving-role cutover) so parity gaps fail CI here.

# ── Controller-image contract (Audit Run 37, #29) ────────────────────────────
# The DEAD-ON-ARRIVAL failure (#29): this compose was synced to the post-CD10
# controller — its serving pool connects as the least-privilege `fseven_app`
# role, a capability the controller only provisions in builds AT OR AFTER the
# version below — while the published `:latest` image was still the pre-CD10
# `v0.2.2` that never creates that role. `curl … install.sh | bash` produced a
# non-functional stack, and the env-contract parity gate could not catch it: the
# compose and the *image* were from different eras and nothing asserted the
# published image is new enough for what the compose needs.
#
# `min_controller_version` makes that assertion machine-readable. When a resync
# makes this compose depend on a newer controller capability, bump it to the
# release that introduced the capability. tests/controller-image-parity.sh reads
# the published image's `org.opencontainers.image.version` label and FAILS CI
# when it is older than this floor — forcing a current controller image to be
# published before the drift can reach a self-hoster.
#
# KEEP THIS KEY across resyncs (the compose is resynced verbatim from the
# controller source on each release, release.yml). The parity gate fails closed
# if it goes missing, so a resync that drops it turns CI red rather than silently
# disabling the guard. Docker Compose ignores top-level `x-` keys — inert at runtime.
x-fseven-controller-contract:
  min_controller_version: v0.3.0

services:
  # Postgres — used by every profile. POSTGRES_PASSWORD is REQUIRED with no
  # default: the `:?` form makes `docker compose` fail closed when it is unset
  # instead of silently using a weak credential (Audit Run 34, INF2/INF3).
  # install.sh generates a strong password for prod/community; local dev gets a
  # throwaway value from .env.example.
  postgres:
    # INF7 (Audit Run 34/35): pin by immutable digest, not the mutable
    # `:16-alpine` tag, so a moved upstream tag cannot silently change the
    # image under a deployment. The trailing tag is retained for human
    # readability; the digest is what Docker resolves. Bump both together when
    # intentionally upgrading.
    image: postgres:16-alpine@sha256:e013e867e712fec275706a6c51c966f0bb0c93cfa8f51000f85a15f9865a28cb
    container_name: fseven-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: seven
      # Fail closed: no default. `docker compose` aborts with this message when
      # POSTGRES_PASSWORD is unset, instead of falling back to a weak credential
      # (Audit Run 34, INF2). Because every other interpolation of this variable
      # (controller DATABASE_URL, OpenFGA datastore URI) reuses the same value,
      # requiring it here is the single source of truth and removes the prior
      # divergent fallbacks (INF3).
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required and has no default; set a strong secret in .env (install.sh generates one) or copy .env.example for local dev.}"
      POSTGRES_DB: seven_controller
    ports:
      # Bind to loopback by default — community deployments don't need
      # remote DB access. Operators who do can override with
      # POSTGRES_BIND=0.0.0.0 in .env.
      - "${POSTGRES_BIND:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seven -d seven_controller"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Controller — runs in containerised deployments (community, prod).
  # Intentionally NOT in `dev`: dev developers run `cargo run` on the host
  # to get hot-reload + native debugger.
  controller:
    # INF7 (Audit Run 34/35): the controller image is published from this repo's
    # release.yml, which records the exact multi-arch manifest digest in
    # `release-manifest.json` (`controller.digest`). Production/community
    # deployments SHOULD pin to that digest by setting `CONTROLLER_IMAGE` to
    # `ghcr.io/...controller@sha256:<digest>`; install.sh wires this from the
    # release manifest. The `:latest` default below is the local-build / quick-
    # start fallback only — pinning the always-moving `:latest` tag here would be
    # meaningless because it is rebuilt every release.
    image: ${CONTROLLER_IMAGE:-ghcr.io/f7-platform/public-agent-binaries/controller:latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fseven-controller
    restart: unless-stopped
    profiles: [community, prod]
    ports:
      - "${PORT:-8080}:8080"
    environment:
      HOST: "0.0.0.0"
      PORT: "8080"
      DEPLOYMENT_MODE: "${DEPLOYMENT_MODE:-Community}"
      # Request-serving pool — RLS SERVING-ROLE CUTOVER (Audit Run 35, CD10/#229).
      # Connects as the least-privilege `fseven_app` role (NOSUPERUSER/NOBYPASSRLS,
      # created by migration 113, provisioned + verified at startup from
      # FSEVEN_APP_DB_PASSWORD — the controller refuses to boot if the role can
      # bypass RLS). Every tenant-scoped request handler now sets the per-request
      # `app.current_org_id` GUC via acquire_org_scoped (#200), so FORCE RLS
      # enforces org isolation at the DB layer; non-tenant paths (migrations,
      # bootstrap, cross-org workers, control plane) run as the owner role over
      # DATABASE_ADMIN_URL below. ROLLBACK: point DATABASE_URL back at the owner
      # role `seven:${POSTGRES_PASSWORD}` and redeploy (no data migration).
      # Audit Run 34/35 INF3: reuse the SAME fail-closed `:?` form as the
      # postgres service and the OpenFGA datastore URI so every interpolation of
      # POSTGRES_PASSWORD shares one source of truth. The prior
      # `${POSTGRES_PASSWORD:-}` empty default was the divergent fallback the
      # finding flagged — it would have handed the controller an empty DB
      # password if the var were unset. `:?` makes `docker compose` abort before
      # the controller starts instead of silently using an empty credential.
      DATABASE_URL: "postgres://fseven_app:${FSEVEN_APP_DB_PASSWORD:?FSEVEN_APP_DB_PASSWORD is required for the RLS serving-role cutover; install.sh generates it and backfills an existing .env}@postgres:5432/seven_controller"
      # Migrations + privileged bootstrap + cross-org workers connect as the owner
      # role `seven` (this MUST stay the owner role for migrations/RLS-bypass paths).
      DATABASE_ADMIN_URL: "postgres://seven:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required and has no default}@postgres:5432/seven_controller"
      # Password for the `fseven_app` role, provisioned + verified at startup and
      # used by the serving pool (DATABASE_URL) after the cutover above.
      FSEVEN_APP_DB_PASSWORD: "${FSEVEN_APP_DB_PASSWORD:?FSEVEN_APP_DB_PASSWORD is required for the RLS serving-role cutover}"
      OPENFGA_API_URL: "${OPENFGA_API_URL:-}"
      DASHBOARD_DIR: "/app/dashboard/dist"
      KNOWLEDGE_MODELS_DIR: "/app/knowledge-models"
      MODEL_STORAGE_DIR: "/app/model-storage"
      RUST_LOG: "${RUST_LOG:-info,fseven_controller=info,tower_http=info}"
      ADMIN_API_KEY: "${ADMIN_API_KEY:-}"
      CREDENTIAL_ENCRYPTION_KEY: "${CREDENTIAL_ENCRYPTION_KEY:-}"
      CONTROLLER_JWT_PRIVATE_KEY: "${CONTROLLER_JWT_PRIVATE_KEY:-}"
      FSEVEN_LICENSE_PUB_KEY: "${FSEVEN_LICENSE_PUB_KEY:-}"
      # Distributed rate limiting (Audit Run 37, CC10). Empty => per-replica
      # in-process buckets, which is only correct for a SINGLE replica. Point
      # every replica at one Redis to make the configured limits fleet-wide.
      # Deliberately NOT defaulted to `redis://redis:6379`: the Redis service
      # below is opt-in (`--profile redis`), and silently pointing the controller
      # at a host that may not exist would trade a real limiter for a degraded
      # one on every request. Fail-degraded, never fail-open — see
      # server/src/middleware/rate_limit.rs.
      REDIS_URL: "${REDIS_URL:-}"
    volumes:
      - model-storage:/app/model-storage
    depends_on:
      postgres:
        condition: service_healthy

  # OpenFGA — only enterprise / cloud + local dev profiles. The community
  # profile uses the in-process SingleOrgAuthorizer; it neither needs
  # nor starts OpenFGA. See §G4 (single-code-path: authorizer interface,
  # not conditional compose).
  openfga:
    # INF7 (Audit Run 34/35): pin by immutable digest (matches the digest pinned
    # in openfga/Dockerfile by PR #243), not the mutable `:v1.8` tag.
    image: openfga/openfga:v1.8@sha256:1e84deddc7c84de8344f3eb0d443c5439666198b68ac37c24fd76fd2e8c1f629
    container_name: fseven-openfga
    restart: unless-stopped
    command: run
    profiles: [prod, dev]
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      # Same single source of truth as Postgres — fail closed, no devpassword
      # default (Audit Run 34, INF2). OpenFGA connects to the same Postgres.
      OPENFGA_DATASTORE_URI: "postgres://seven:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required and has no default}@postgres:5432/seven_controller"
      OPENFGA_LOG_LEVEL: "info"
      # INF5 (Audit Run 34): the playground exposes the authorization-model
      # editing UI and must never be reachable in production. Default to OFF and
      # require an explicit opt-in for local dev (`OPENFGA_PLAYGROUND_ENABLED=true`
      # in your shell / .env) rather than shipping it enabled in the prod profile.
      OPENFGA_PLAYGROUND_ENABLED: "${OPENFGA_PLAYGROUND_ENABLED:-false}"
    ports:
      - "${OPENFGA_BIND:-127.0.0.1}:8082:8080"
      - "${OPENFGA_BIND:-127.0.0.1}:8083:8081"
      - "${OPENFGA_BIND:-127.0.0.1}:3002:3000"
    depends_on:
      postgres:
        condition: service_healthy
    # The OpenFGA image is distroless (no shell/nc). Health is verified
    # externally by scripts/dev.sh polling http://localhost:8082/healthz.
    healthcheck:
      disable: true

  # Redis — OPTIONAL, opt-in via the `redis` profile. Holds the shared rate-limit
  # counters so that every controller replica increments ONE bucket (Audit Run 37,
  # CC10 / CTL-AUTH-2). Without it, N replicas each grant the full quota and the
  # effective auth/admin/enrollment limits are N x what is configured.
  #
  #   docker compose --profile prod --profile redis up -d
  #   # ...and set REDIS_URL=redis://redis:6379 in .env
  #
  # It is a separate profile rather than part of `prod` because turning on Redis is
  # a deployment decision (an operator may already run a managed/HA Redis and just
  # point REDIS_URL at it). The controller has NO depends_on for it: if Redis is
  # missing or unreachable the limiter degrades to per-replica in-process buckets
  # and logs WARN — it never fails open, and a Redis outage never takes down auth.
  redis:
    # INF7 (Audit Run 34/35): pin by immutable digest, not the mutable `:7-alpine`
    # tag. Bump both together when intentionally upgrading.
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    container_name: fseven-redis
    restart: unless-stopped
    profiles: [redis]
    # Rate-limit counters are ephemeral and self-expiring (TTL == the rate-limit
    # window), so persistence is pointless here — disable RDB snapshots and the AOF
    # rather than writing short-lived counters to disk. Losing this data on restart
    # is harmless: buckets simply refill.
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      # Loopback-only by default. This Redis has NO password: it is reachable on the
      # compose network by the controller and, on the host, only from localhost.
      # If you expose it beyond that (REDIS_BIND=0.0.0.0) or run it off-box, you MUST
      # add `--requirepass` + TLS and use a rediss:// REDIS_URL — an unauthenticated
      # Redis on a routable interface is a trivially abusable open data store.
      - "${REDIS_BIND:-127.0.0.1}:${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Adminer — local-developer convenience only. Never enabled in
  # community or prod profiles.
  adminer:
    # INF7 (Audit Run 34/35): pin by immutable digest, not the mutable `:4` tag.
    # Dev-profile-only convenience image, but pinned for consistency.
    image: adminer:4@sha256:1068c07446f47f6d52a47387c68341b21b075b6bd651e4bb85d7fc14bca9c33a
    container_name: fseven-adminer
    restart: unless-stopped
    profiles: [dev]
    ports:
      - "${ADMINER_BIND:-127.0.0.1}:8081:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  model-storage:

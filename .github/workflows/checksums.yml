name: Generate checksums

on:
  push:
    branches: [main]
    paths:
      - 'v*/**'

jobs:
  checksums:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate checksums for new releases
        run: |
          set -euo pipefail
          # Find version directories that changed in this push
          CHANGED_DIRS=$(git diff --name-only HEAD~1 HEAD | grep -oP '^v[\d.]+/' | sort -u || true)
          if [[ -z "$CHANGED_DIRS" ]]; then
            echo "No version directories changed. Skipping."
            exit 0
          fi

          for dir in $CHANGED_DIRS; do
            dir="${dir%/}"
            echo "Generating checksums for $dir..."
            if [[ -d "$dir" ]]; then
              (cd "$dir" && sha256sum *.pkg *.msi *.tar.gz 2>/dev/null > SHA256SUMS || true)
              echo "SHA256SUMS generated for $dir:"
              cat "$dir/SHA256SUMS"
            fi
          done

      - name: Commit checksums
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add '*/SHA256SUMS'
          if git diff --cached --quiet; then
            echo "No checksum changes to commit."
          else
            git commit -m "chore: auto-generate SHA256SUMS for new releases"
            git push
          fi

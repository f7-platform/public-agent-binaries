name: static-checks

# The installer/compose contract gate (tests/bootstrap-handoff-static.sh) is the
# only automated check that catches drift between the published distribution
# artifacts and the controller source of truth (PB6, Audit Run 34/35/36) — but
# nothing ran it: this repo had no pull-request workflow at all, so every
# assertion in it was advisory. Run it on every PR and on main.
#
# GitHub-hosted runners ship Docker AND PowerShell, so the gate's behavioural
# halves execute here, not just the `grep`-the-source half:
#   * the rendered-compose contract (fail-closed POSTGRES_PASSWORD /
#     FSEVEN_APP_DB_PASSWORD, prod-profile OpenFGA playground),
#   * the PB4 round-trip — a real multi-line Ed25519 PEM written by the real
#     installers, rendered by the real `docker compose`, and required to reach
#     the container's environment byte-for-byte intact,
#   * the install.sh AND install.ps1 behaviour scenarios (PB3 scrub guidance on
#     every branch, PB5 restricted-before-write .env).
#
# FSEVEN_REQUIRE_DOCKER / FSEVEN_REQUIRE_PWSH / FSEVEN_REQUIRE_TOOLS make the gate
# FAIL rather than skip if docker, pwsh, python3 or openssl is missing from the
# runner. A check that silently skips is not a check — that is precisely how PB4
# stayed open on Windows for three audit runs while CI was green. FSEVEN_REQUIRE_TOOLS
# closes the last of those: several PB4 assertions (the rendered-PEM round-trips and
# the Ed25519 key-validity checks) used to no-op with no guard at all whenever
# python3/openssl were absent.
#
# The ubuntu job runs install.ps1 under PowerShell Core on LINUX, where
# Protect-FilePath takes its `chmod` branch — it proves the ordering logic and
# explicitly NOT the Windows ACL logic. PB5's actual home (Get-Acl/Set-Acl) needs a
# Windows runner, so `install-ps1-acl-windows` below is a second, non-optional job.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # #29: the published `:latest` image and this compose can drift apart BETWEEN
    # releases (the DOA was a compose synced ahead of a stale image, with no PR to
    # this repo to trip a push/PR check). Re-run the controller-image parity gate
    # weekly so a stale published image is caught even when nothing here changes.
    # Only that job runs on this trigger (see the `if:` guards below).
    - cron: '17 8 * * 1'   # Mondays 08:17 UTC

permissions:
  contents: read

jobs:
  bootstrap-handoff-static:
    # Static/installer contracts only change with a commit — no value re-running on
    # the schedule (that trigger exists for the live-image parity job below).
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    env:
      FSEVEN_REQUIRE_DOCKER: '1'
      FSEVEN_REQUIRE_PWSH: '1'
      FSEVEN_REQUIRE_TOOLS: '1'
    steps:
      - uses: actions/checkout@v4

      - name: Shell syntax
        run: |
          bash -n install.sh
          bash -n tests/bootstrap-handoff-static.sh

      - name: PowerShell syntax
        shell: pwsh
        run: |
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path ./install.ps1), [ref]$null, [ref]$errors) | Out-Null
          if ($errors) { $errors | ForEach-Object { Write-Host $_ }; exit 1 }
          Write-Host 'install.ps1 parses clean'

      - name: Installer / compose contract gate
        run: bash tests/bootstrap-handoff-static.sh

  # PB5 is a WINDOWS ACL finding — Get-Acl/Set-Acl, and the fact that a new file on
  # Windows inherits the ACL of the CONTAINING DIRECTORY rather than that of the file
  # it was copied from. That code had never executed in CI: this repo had no
  # windows-latest job at all, so the Windows half of PB5 was asserted-by-construction
  # while the ubuntu job exercised only Protect-FilePath's `chmod` branch. Run the real
  # install.ps1 on a real Windows runner, in a deliberately permissive directory, and
  # assert on the resulting ACL and on the creation-time ORDER of the restrictions.
  # No Docker and no network needed: -ProvisionEnvOnly is the .env writer end-to-end.
  install-ps1-acl-windows:
    # Windows ACL logic only changes with install.ps1 — skip the (billed) Windows
    # runner on the scheduled parity re-run.
    if: github.event_name != 'schedule'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: install.ps1 Windows ACL gate (PB5)
        shell: pwsh
        run: ./tests/install-ps1-acl-windows.ps1

  # #29 (Audit Run 37) — Published controller-image parity gate. The env-contract
  # gate above renders the compose in isolation; it never looks at the IMAGE the
  # compose points at, which is exactly how the "dead on arrival" community stack
  # shipped (compose synced to the post-CD10 fseven_app serving role, published
  # `:latest` stuck at the pre-CD10 v0.2.2 that never provisions that role). This
  # job reads the published image's org.opencontainers.image.version and fails when
  # it is older than the compose's declared min_controller_version floor.
  controller-image-parity:
    runs-on: ubuntu-latest
    env:
      # A gate that silently skips is not a gate (PB6/BF14): make a missing buildx
      # or an unreadable image a hard failure here, never a green no-op.
      FSEVEN_REQUIRE_DOCKER: '1'
    steps:
      - uses: actions/checkout@v4

      - name: Published controller image >= compose floor (#29)
        run: bash tests/controller-image-parity.sh
